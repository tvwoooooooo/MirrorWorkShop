name = "mirrorworkshop"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "B2_KV"
# 无需填写 ID，可在 Dashboard 手动绑定

[[queues.producers]]
queue = "mirror-tasks"
binding = "TASKS_QUEUE"

[[queues.consumers]]
queue = "mirror-tasks"
max_batch_size = 1
max_retries = 3
max_concurrency = 1

[[d1_databases]]
binding = "DB"
database_name = "b2-mirror-db"
# 无需填写 ID，可在 Dashboard 手动绑定

[observability]
[observability.logs]
enabled = true
invocation_logs = true
