name = "mirrorworkshop"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "B2_KV"

[[queues.producers]]
queue = "mirror-tasks"
binding = "TASKS_QUEUE"

[[queues.consumers]]
queue = "mirror-tasks"
max_batch_size = 1
max_retries = 3
max_concurrency = 1

[[d1_databases]]
binding = "DB"
database_name = "b2-mirror-db"
